      (function () {
        var p = window.location.search.match(/p=\/([^&]*)/);
        if (p) {
          var q = window.location.search.match(/q=(.*)/);
          window.history.replaceState(
            null, null,
            '/helpdesk/' + p[1].replace(/~and~/g, '&') +
            (q ? '?' + q[1].replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      })();
